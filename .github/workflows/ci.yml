name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci
      - run: npm run check:bundle
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx supabase@2.109.1 start
      - run: npx supabase@2.109.1 db reset
      - run: npx supabase@2.109.1 test db
      - run: npx supabase@2.109.1 db lint --level error
      - name: Verify generated database types
        run: |
          npx supabase@2.109.1 gen types typescript --local > /tmp/database.types.ts
          npm run check:database-types -- /tmp/database.types.ts src/types/database.types.ts
